# Configuration nginx pour servir les fichiers statiques de e-FinTrack
# À ajouter dans votre configuration nginx existante

server {
    listen 80;
    server_name 187.77.171.80;
    
    # Configuration principale Django/gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # SERVIR LES FICHIERS STATIQUES - IMPORTANT POUR L'ADMIN DJANGO
    location /static/ {
        alias /home/kandolo/e-FinTrack/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Options de sécurité
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";
    }
    
    # SERVIR LES FICHIERS MEDIA
    location /media/ {
        alias /home/kandolo/e-FinTrack/media/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Pages d'erreur personnalisées
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    # Sécurité
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    
    # Logging
    access_log /var/log/nginx/e-fintrack-access.log;
    error_log /var/log/nginx/e-fintrack-error.log;
}

# Alternative si vous utilisez déjà une configuration server
