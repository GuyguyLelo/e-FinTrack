<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RBAC - Gestion des Rôles{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/rbac/modeles/dashboard/">
                <i class="bi bi-shield-check me-2"></i>
                RBAC - Modèles Django
            </a>
            
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/rbac/modeles/dashboard/">
                    <i class="bi bi-speedometer2"></i> Tableau de bord
                </a>
                <a class="nav-link" href="/rbac/modeles/permissions/">
                    <i class="bi bi-key"></i> Permissions
                </a>
                <a class="nav-link" href="/rbac/modeles/roles/">
                    <i class="bi bi-people"></i> Rôles
                </a>
                <a class="nav-link" href="/">
                    <i class="bi bi-house"></i> Retour à l'app
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <footer class="bg-light text-center py-3 mt-5">
        <div class="container">
            <p class="mb-0">Système RBAC basé sur les modèles Django</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
